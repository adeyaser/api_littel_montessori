<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Docs: Little Home Wali Murid</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />  <style>
    /* Ganti logo Swagger UI */
    .swagger-ui .topbar .topbar-wrapper img {
      content: url('https://littlehomemontessori.my.id/assets/logo.png') !important;
      height: 40px !important;
      object-fit: contain;
    }
  </style></head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js" crossorigin></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: "api.yaml?v=" + new Date().getTime(),
        dom_id: '#swagger-ui',
      });
    };
  </script>
</body>
</html>
